<!DOCTYPE html>
<html lang="uk" class="overflow-x-hidden">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вхід</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen overflow-x-hidden bg-slate-100 text-slate-900 antialiased md:h-screen md:overflow-hidden">
  <div class="min-h-screen pb-24 md:h-full md:pb-28">
  <main class="mx-auto flex min-h-screen max-w-6xl items-center justify-center px-4 py-6 md:h-full md:py-10">
    <section class="w-full max-w-md rounded-2xl bg-white p-6 shadow-xl shadow-slate-300/60 sm:p-8">
      <h1 class="text-xl font-semibold sm:text-2xl">Вхід у систему</h1>
      <p class="mt-2 text-sm text-slate-600">Використайте логін та пароль для авторизації.</p>

      {% if form and form.errors %}
        <div class="mt-4 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
          Невірний логін або пароль.
        </div>
      {% endif %}

      <form action="{{ url('login') }}" method="post" class="mt-6 space-y-4">
        {% if csrf_input is defined %}
          {{ csrf_input }}
        {% endif %}

        <div>
          <label for="username" class="mb-1 block text-sm font-medium text-slate-700">Логін</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            required
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none ring-emerald-400 transition focus:ring"
          >
        </div>

        <div>
          <label for="password" class="mb-1 block text-sm font-medium text-slate-700">Пароль</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none ring-emerald-400 transition focus:ring"
          >
        </div>

        <button
          type="submit"
          class="inline-flex w-full items-center justify-center rounded-lg bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-700"
        >
          Увійти
        </button>
      </form>
    </section>
  </main>
  </div>
  {% include 'partials/footer.html' %}
</body>
</html>
